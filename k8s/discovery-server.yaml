apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
        - name: discovery-server
          image: petclinicdevacr.azurecr.io/spring-petclinic-discovery-server
          ports:
            - containerPort: 8761
          env:
            - name: CONFIG_SERVER_URL
              value: http://config-server:8888
            - name: NEW_RELIC_APP_NAME
              value: petclinic-discovery-server
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-license
                  key: NEW_RELIC_LICENSE_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: petclinic
spec:
  selector:
    app: discovery-server
  ports:
    - port: 8761
      targetPort: 8761
