apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: petclinicdevacr.azurecr.io/spring-petclinic-api-gateway
          ports:
            - containerPort: 8080
          env:
            - name: CONFIG_SERVER_URL
              value: http://config-server:8888
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka/
            - name: NEW_RELIC_APP_NAME
              value: petclinic-api-gateway
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-license
                  key: NEW_RELIC_LICENSE_KEY
            - name: NEW_RELIC_BROWSER_ACCOUNT_ID
              value: "8065704"
            - name: NEW_RELIC_BROWSER_TRUST_KEY
              value: "8065704"
            - name: NEW_RELIC_BROWSER_AGENT_ID
              value: "1431931403"
            - name: NEW_RELIC_BROWSER_APPLICATION_ID
              value: "1431931403"
            - name: NEW_RELIC_BROWSER_LICENSE_KEY
              value: "NRJS-e39c692cdb660644855"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: petclinic
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
